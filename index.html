<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-LAB / Design Methods</title>
  <link rel="stylesheet" href="/assets/style.css">
  <script type="importmap">
    {
      "imports": {
        "db":     "/js/db.js",
        "ui":     "/js/ui.js",
        "filter": "/js/filter.js",
        "router": "/js/router.js"
      }
    }
  </script>
</head>
<body>
  <div id="app">

    <header>
      <span class="site-id"><strong>S-LAB</strong> / Design Methods</span>
      <span class="site-version">v0.1</span>
    </header>

    <nav>
      <button class="tab active" data-tab="operative">Operative</button>
      <button class="tab"        data-tab="conditional">Conditional</button>
    </nav>

    <div class="toolbar" id="toolbar">
      <div class="filter-group" id="filter-cat">
        <button class="chip active" data-filter="category" data-value="">All</button>
        <button class="chip"        data-filter="category" data-value="add">Add</button>
        <button class="chip"        data-filter="category" data-value="displace">Displace</button>
        <button class="chip"        data-filter="category" data-value="subtract">Subtract</button>
      </div>
      <div class="sep"></div>
      <div class="filter-group" id="filter-tec">
        <button class="chip active" data-filter="tectonic" data-value="">All</button>
        <button class="chip"        data-filter="tectonic" data-value="stereotomic">Stereotomic</button>
        <button class="chip"        data-filter="tectonic" data-value="neutral">Neutral</button>
        <button class="chip"        data-filter="tectonic" data-value="tectonic">Tectonic</button>
      </div>
      <div class="sep"></div>
      <input class="search" id="search" type="search"
             placeholder="search…" autocomplete="off" spellcheck="false">
      <span class="count" id="count"></span>
    </div>

    <main id="main"></main>

  </div>

  <div class="overlay" id="overlay"></div>
  <div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Operation detail">
    <div class="drawer-body" id="drawer-body"></div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
